[pytest]
# pytest configuration for cybersecsuite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    asyncio: async test (asyncio)
    integration: integration test (requires services)
    slow: slow test
    crypto: cryptography tests
    mcp: MCP server tests
    agent: agent SDK tests
    integrity: integrity checks
    telemetry: telemetry tests
    proxy: AI proxy tests
    a2a: A2A protocol tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Asyncio mode
asyncio_mode = auto

# Coverage
[coverage:run]
branch = True
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

