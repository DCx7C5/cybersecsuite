x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-db-env: &db-env
  CYBERSEC_DB_USER: ${CYBERSEC_DB_USER:-cybersec}
  CYBERSEC_DB_PASSWORD: ${CYBERSEC_DB_PASSWORD:-cybersec_default}
  CYBERSEC_DB_NAME: ${CYBERSEC_DB_NAME:-cybersec_forensics}

x-ai-keys: &ai-keys
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}
  TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}

x-oo-env: &oo-env
  OPENOBSERVE_HOST: ${OPENOBSERVE_HOST:-http://cybersec-openobserve:5080}
  OPENOBSERVE_ORG: ${OPENOBSERVE_ORG:-default}
  OPENOBSERVE_EMAIL: ${OPENOBSERVE_ROOT_EMAIL:-admin@cybersec.local}
  OPENOBSERVE_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD:-cYb3rS3c!}

x-crypto-env: &crypto-env
  DYSTOPIAN_VAULT_PASSWORD: ${DYSTOPIAN_VAULT_PASSWORD:-change_me}
  DYSTOPIAN_VAULT_PASSWORD_FILE: ${DYSTOPIAN_VAULT_PASSWORD_FILE:-}

services:
  cybersec-dashboard:
    profiles:
      - default
    build:
      context: .
      dockerfile: .docker/dashboard/Dockerfile
    image: cybersec-dashboard
    container_name: cybersec-dashboard
    <<: *common
    tty: true
    stdin_open: true
    depends_on:
      cybersec-postgres:
        condition: service_healthy
    environment:
      <<: [ *db-env, *ai-keys, *oo-env, *crypto-env ]
      # Unix socket: just the directory — asyncpg appends /.s.PGSQL.<port>
      CYBERSEC_DB_HOST: /tmp
      CYBERSEC_DB_PORT: 5432
      CYBERSEC_AUTO_CREATE_DB: "true"
      CYBERSEC_REDIS_URL: "redis://cybersec-redis:6379/0"
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8765:8000"
      - "127.0.0.1:8443:8443"
    volumes:
      - pg_socket:/tmp                          # shared socket directory with postgres
      - ${HOME}/.claude:/app/.claude-global:rw  # host ~/.claude (global settings, plugins)
    healthcheck:
      test: [ "CMD", "curl", "-fs", "http://localhost:8000/health" ]   # liveness only
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 5s

  cybersec-postgres:
    profiles:
      - default
    build:
      context: .docker/postgres
      dockerfile: Dockerfile
    image: cybersec-postgres
    container_name: cybersec-postgres
    <<: *common
    environment:
      <<: *db-env
      POSTGRES_DB_PORT: 5432
      POSTGRES_USER: ${CYBERSEC_DB_USER:-cybersec}
      POSTGRES_PASSWORD: ${CYBERSEC_DB_PASSWORD:-change_me}
      POSTGRES_DB: ${CYBERSEC_DB_NAME:-cybersec_forensics}
      PGDATA: /var/libs/postgresql/data
    volumes:
      - pg_data:/var/libs/postgresql/data
      - pg_socket:/tmp
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  cybersec-redis:
    profiles:
      - default
    build:
      context: .docker/redis
      dockerfile: Dockerfile
    image: cybersec-redis
    container_name: cybersec-redis
    <<: *common
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - redis_socket:/var/run/redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
      start_interval: 3s

  cybersec-ollama:
    image: ollama/ollama:latest
    container_name: cybersec-ollama
    profiles:
      - default
    <<: *common
    entrypoint: /docker-entrypoint.sh
    environment:
      OLLAMA_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./.docker/ollama/entrypoint.sh:/docker-entrypoint.sh:ro
      - ./.docker/ollama/Modelfile:/modelfile/Modelfile:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cybersec-openobserve:
    profiles:
      - default
    image: openobserve/openobserve:latest
    container_name: cybersec-openobserve
    <<: *common
    restart: unless-stopped
    environment:
      <<: *oo-env
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_ROOT_EMAIL:-admin@cybersec.local}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_ROOT_PASSWORD:-cYb3rS3c!}
      ZO_HTTP_PORT: 5080
    ports:
      - "127.0.0.1:${OPENOBSERVE_PORT:-5080}:5080"
    volumes:
      - oo_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5080/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s



volumes:
  pg_data:
  pg_socket:
  redis_data:
  redis_socket:
  oo_data:
  ollama_data:
  openobserve_data:
  openobserve_logs:
  openobserve_etc:
