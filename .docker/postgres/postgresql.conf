
listen_addresses = '*'                                   # all interfaces — required for Docker port mapping to work
port = 5432
unix_socket_directories = '/var/run/postgresql,/tmp'   # Alpine braucht oft /tmp als Fallback
unix_socket_permissions = 0777                         # all container users can connect; TCP is not exposed

max_connections = 150
superuser_reserved_connections = 5

# Memory (8 GB RAM)
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 12MB                  # was 32MB — at 150 conns×3 workers, 32MB risks OOM on 8GB RAM
maintenance_work_mem = 512MB
wal_buffers = -1                 # auto (1/32 of shared_buffers ≈ 64MB); was hardcoded 16MB

# WAL & Checkpoints
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB             # was 1GB — no need to retain that much WAL at idle

# SSD Optimierung
random_page_cost = 1.1
effective_io_concurrency = 200

# Parallelität
max_parallel_workers_per_gather = 2
max_parallel_workers = 3         # was 4 = max_worker_processes, starved background workers
max_worker_processes = 4

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 250ms
log_checkpoints = on
log_connections = on
log_disconnections = on

ssl = off                        # disabled: all connections use Unix socket; TCP not exposed externally