[project]
name = "cybersecsuite"
version = "0.1.0"
description = "Cybersecurity forensics suite — A2A agent orchestration, MCP server, threat intelligence, artifact signing"
readme = "README.md"
requires-python = ">=3.14"

dependencies = [
    # MCP server
    "fastmcp>=2.0",
    # ASGI
    "starlette>=0.46",
    "uvicorn[standard]>=0.34",
    # Database
    "tortoise-orm[asyncpg]>=0.22",
    "asyncpg>=0.30",
    # A2A agent networking + AI proxy HTTP client
    "httpx[http2]>=0.28",
    # Data validation
    "pydantic>=2.10",
    # Agent loader
    "pyyaml>=6.0",
    # Cryptography
    "cryptography>=44.0",
    "argon2-cffi>=23.1",
    # Event loop
    "uvloop>=0.21; sys_platform == 'linux'",
    # Agent SDK
    "claude-agent-sdk @ git+https://github.com/anthropics/claude-agent-sdk-python.git@v0.1.61",
    "openpyxl>=3.1.5",
    "pytest>=9.0.2",
    "claude>=0.4.11",
    "tortoise>=0.1.1",
    "opensearch-py[async]>=2.7",
]

[project.scripts]
cybersecsuite      = "manage:main_sync"
cybersec-mcp       = "csmcp.cybersec.server:main"
cybersec-mcp-crypto = "csmcp.dystopian_server:main"
cybersec-proxy     = "ai_proxy.cli:main"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src"]

[dependency-groups]
dev = [
    "ipython>=9.11.0",
    "ruff>=0.9",
]
test = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "pytest-cov>=6.0",
    "anyio>=4.7",
]
browser = [
    "playwright>=1.49",
    "playwright-stealth>=1.0",
]

[tool.pytest.ini_options]
testpaths   = ["tests"]
pythonpath  = ["src"]
asyncio_mode = "auto"

[tool.ruff]
src = ["src"]
line-length = 100
exclude = [".claude"]
