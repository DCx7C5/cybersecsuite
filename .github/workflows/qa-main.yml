name: 'Tier 2: Main Branch Merge'

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'pytest.ini'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/qa-main.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eslint:
    name: 'ESLint (TypeScript)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/ts_api/package-lock.json'
      
      - name: Install TypeScript API dependencies
        run: npm ci
        working-directory: src/ts_api
      
      - name: Run ESLint
        run: npm run lint --if-present
        working-directory: src/ts_api

  ruff-lint:
    name: 'Ruff (Python Linting)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run Ruff lint
        run: uv run ruff check src tests

  mypy:
    name: 'mypy (Type Checking)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run mypy
        run: uv run mypy src

  pytest-unit:
    name: 'pytest (Unit Tests)'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run unit tests
        run: uv run pytest tests -m "not integration" --tb=short
        env:
          REDIS_URL: redis://localhost:6379

  integration-core:
    name: 'Integration Tests (Core MCPs)'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Run core integration tests
        run: uv run pytest tests -m integration -k "mcp or core" --tb=short
        env:
          REDIS_URL: redis://localhost:6379

  playwright-full:
    name: 'Playwright E2E (Brave + Firefox)'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/ts_api/package-lock.json'
      
      - name: Install Node dependencies
        run: npm ci
        working-directory: src/ts_api
      
      - name: Install Brave browser
        run: |
          sudo apt-get update
          sudo apt-get install -y brave-browser
      
      - name: Run Playwright tests (Brave + Firefox)
        run: npx playwright test --project=brave --project=firefox
        working-directory: src/ts_api
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/ts_api/playwright-report/
          retention-days: 7

  a11y-audit:
    name: 'Axe A11y Audit'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/ts_api/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: src/ts_api
      
      - name: Run Axe accessibility audit
        run: |
          npm install -g @axe-core/cli
          npx axe http://localhost:3000 --headless --browser brave || true
        working-directory: src/ts_api
        continue-on-error: true

  performance-check:
    name: 'Performance Baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/ts_api/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
        working-directory: src/ts_api
      
      - name: Build for production
        run: npm run build --if-present
        working-directory: src/ts_api
      
      - name: Check build size
        run: |
          SIZE=$(du -sh src/ts_api/dist 2>/dev/null | cut -f1)
          echo "Build size: $SIZE"
          # Fail if build exceeds 5MB (adjust as needed)
          BUILD_SIZE_KB=$(du -k src/ts_api/dist 2>/dev/null | cut -f1)
          if [ "$BUILD_SIZE_KB" -gt 5120 ]; then
            echo "❌ Build size exceeds 5MB: ${BUILD_SIZE_KB}KB"
            exit 1
          fi
          echo "✅ Build size within limits: ${BUILD_SIZE_KB}KB"

  coverage:
    name: 'Coverage Report'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync --all-extras
      
      - name: Generate coverage report
        run: uv run pytest tests -m "not integration" --cov=src --cov-report=xml --cov-report=html
        env:
          REDIS_URL: redis://localhost:6379
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  main-gate:
    name: 'Main Gate - All Checks Required'
    runs-on: ubuntu-latest
    needs: [eslint, ruff-lint, mypy, pytest-unit, integration-core, playwright-full, a11y-audit, performance-check, coverage]
    if: always()
    
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.eslint.result }}" == "failure" ]] || \
             [[ "${{ needs.ruff-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.mypy.result }}" == "failure" ]] || \
             [[ "${{ needs.pytest-unit.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-core.result }}" == "failure" ]] || \
             [[ "${{ needs.playwright-full.result }}" == "failure" ]] || \
             [[ "${{ needs.performance-check.result }}" == "failure" ]]; then
            echo "❌ Main branch checks failed - blocking merge"
            exit 1
          fi
          echo "✅ All Tier 2 checks passed - main branch is stable"
