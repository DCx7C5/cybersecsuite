name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - "tests/e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "tests/e2e/**"
      - "playwright.config.ts"

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_cybersec
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox, webkit ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          uv sync --all-groups

      - name: Install Playwright browsers
        run: |
          uv run playwright install ${{ matrix.browser }} --with-deps

      - name: Start application server
        env:
          ENVIRONMENT: test
          CYBERSEC_DB_HOST: localhost
          CYBERSEC_DB_PORT: 5432
          CYBERSEC_DB_USER: test_user
          CYBERSEC_DB_PASSWORD: test_pass
          CYBERSEC_DB_NAME: test_cybersec
          TEST_API_KEY: test-key
        run: |
          uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run E2E tests - ${{ matrix.browser }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8000
          TEST_API_KEY: test-key
          CI: true
        run: |
          uv run playwright test tests/e2e/ --project=${{ matrix.browser }} --reporter=github --reporter=html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.existsSync('test-results/results.json') 
              ? JSON.parse(fs.readFileSync('test-results/results.json', 'utf-8'))
              : { stats: { expected: 0, unexpected: 0, flaky: 0, skipped: 0 } };
            
            const { stats } = testResults;
            const passed = stats.expected || 0;
            const failed = stats.unexpected || 0;
            const skipped = stats.skipped || 0;
            
            const comment = `## E2E Test Results - ${{ matrix.browser }}
            
            - ✅ Passed: ${passed}
            - ❌ Failed: ${failed}
            - ⏭️ Skipped: ${skipped}
            - Total: ${passed + failed + skipped}
            
            [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
