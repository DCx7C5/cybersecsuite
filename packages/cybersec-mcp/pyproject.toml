[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cybersec-mcp"
version = "0.1.0"
description = "CyberSecSuite MCP server — 92+ forensic analysis tools"
authors = [
    { name = "CyberSecSuite Contributors", email = "dev@cybersecsuite.local" }
]
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "anthropic >= 0.38.0",
    "redis >= 4.0.0",
    "httpx >= 0.24.0",
    "tortoise-orm >= 0.20.0",
    "pydantic >= 2.0.0",
    "cryptography >= 41.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest >= 7.0.0",
    "pytest-asyncio >= 0.24.0",
    "black >= 24.0.0",
    "ruff >= 0.2.0",
    "mypy >= 1.8.0",
]

[project.scripts]
cybersec-mcp = "cybersec_mcp:main"

[tool.hatch.build.targets.wheel]
packages = ["cybersec_mcp"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "W", "I"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = false
