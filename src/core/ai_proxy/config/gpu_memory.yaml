# GPU Memory Management Configuration — Phase 2
# T125-T132: GPU memory optimization, capabilities matrix

gpu_memory_profiles:
  minimal:
    description: "Minimal GPU memory usage (mobile/edge devices)"
    vram_mb: 4096
    models_supported:
      - "qwen:1.5b"
    batch_size: 1
    context_cache: false
    flash_attention: false
    
  standard:
    description: "Standard GPU memory (consumer GPUs)"
    vram_mb: 8192
    models_supported:
      - "qwen:1.5b"
      - "qwen:7b"
      - "mistral:7b"
      - "llama2:7b"
    batch_size: 2
    context_cache: true
    flash_attention: true
    
  optimized:
    description: "Optimized GPU memory (workstation GPUs)"
    vram_mb: 16384
    models_supported:
      - "qwen:1.5b"
      - "qwen:7b"
      - "mistral:7b"
      - "llama2:7b"
    batch_size: 4
    context_cache: true
    flash_attention: true
    kv_cache_quantization: true
    
  enterprise:
    description: "Enterprise GPU memory (high-end data center)"
    vram_mb: 32768
    models_supported:
      - "qwen:1.5b"
      - "qwen:7b"
      - "mistral:7b"
      - "llama2:7b"
    batch_size: 8
    context_cache: true
    flash_attention: true
    kv_cache_quantization: true
    tensor_parallelism: true

memory_optimization:
  techniques:
    - "kv_cache_quantization"
    - "flash_attention"
    - "gradient_checkpointing"
    - "offload_to_cpu"
    - "model_quantization"
    - "batched_inference"
    
  kv_cache_config:
    enabled: true
    dtype: "float16"  # Options: float32, float16, bfloat16, int8
    max_seq_length: 8192
    reuse_across_batches: true
    
  flash_attention_config:
    enabled: true
    block_size: 128
    causal_mask: true
    
  quantization_config:
    dtype: "int4"  # Options: int4, int8, float8
    compute_dtype: "float16"
    calibration_samples: 128

memory_monitoring:
  enabled: true
  sampling_interval_seconds: 5
  alert_threshold_percent: 85
  critical_threshold_percent: 95
  
  metrics_collected:
    - "vram_used_mb"
    - "vram_available_mb"
    - "vram_percent"
    - "memory_utilization_percent"
    - "temperature_celsius"
    - "power_usage_watts"

memory_reclamation:
  enabled: true
  strategy: "lru"  # Least Recently Used
  reclaim_interval_seconds: 30
  min_free_percent: 20  # Keep at least 20% free
  
  actions:
    - "clear_cache_on_new_request"
    - "offload_unused_models_to_cpu"
    - "reduce_batch_size_if_oom"
    - "trigger_gc_if_memory_high"
