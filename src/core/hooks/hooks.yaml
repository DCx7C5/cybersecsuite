# CyberSecSuite Hook Configuration
# YAML-based declarative configuration for the hook system
# Version 1.0

version: "1.0"

hooks:
  # Pre-Tool Use: Runs before a tool is called
  # Used for permission checks, write guard, pre-execution validation
  pre_tool_use:
    enabled: true
    handlers:
      - name: write_guard
        enabled: true
        pattern: "Write|Edit|Bash"
      - name: audit
        enabled: true
        pattern: ".*"
  
  # Post-Tool Use: Runs after a tool succeeds
  # Used for result logging, audit trail, post-execution validation
  post_tool_use:
    enabled: true
    handlers:
      - name: audit
        enabled: true
      - name: result_processor
        enabled: true
        pattern: ".*"
  
  # Post-Tool Use Failure: Runs when a tool fails
  # Used for error logging, recovery setup, failure audit
  post_tool_use_failure:
    enabled: true
    handlers:
      - name: audit
        enabled: true
      - name: error_handler
        enabled: true
  
  # User Prompt Submit: Runs before sending prompt to model
  # Used for context injection, PII redaction, system prompt modification
  user_prompt_submit:
    enabled: true
    handlers:
      - name: audit
        enabled: true
      - name: message_formatter
        enabled: true
  
  # Streaming Hooks
  pre_streaming:
    enabled: true
    handlers:
      - name: stream_initializer
        enabled: true
  
  streaming_token:
    enabled: true
    handlers:
      - name: token_batcher
        enabled: true
        extra:
          batch_size: 10
  
  post_streaming:
    enabled: true
    handlers:
      - name: stream_finalizer
        enabled: true
  
  # Message Hooks: For message-level operations
  message:
    enabled: true
    handlers:
      - name: pii_redaction
        enabled: true
      - name: message_audit
        enabled: true
  
  # Recovery Hooks: For error recovery and retry logic
  pre_retry:
    enabled: true
    handlers:
      - name: retry_logger
        enabled: true
      - name: retry_classifier
        enabled: true
  
  on_recovery:
    enabled: true
    handlers:
      - name: recovery_logger
        enabled: true
  
  on_error:
    enabled: true
    handlers:
      - name: error_logger
        enabled: true
      - name: error_classifier
        enabled: true
  
  # Agent Lifecycle Hooks
  agent_start:
    enabled: true
    handlers:
      - name: agent_lifecycle_logger
        enabled: true
  
  agent_stop:
    enabled: true
    handlers:
      - name: agent_lifecycle_logger
        enabled: true
  
  # Session Lifecycle Hooks
  session_start:
    enabled: true
    handlers:
      - name: session_logger
        enabled: true
  
  session_end:
    enabled: true
    handlers:
      - name: session_logger
        enabled: true
  
  # Compact Hooks: For context compression
  pre_compact:
    enabled: true
    handlers:
      - name: compact_logger
        enabled: true
  
  post_compact:
    enabled: true
    handlers:
      - name: compact_logger
        enabled: true

  # First Setup
  first_setup:
    enabled: true
    handlers:
      - name: first_setup_handler
        enabled: true

  # Plan lifecycle (start events enabled by default)
  plan_start:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_stop:
    enabled: false        # verbose, opt-in
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_complete:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true

  plan_phase_start:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_phase_stop:
    enabled: false
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_phase_complete:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true

  plan_task_start:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_task_stop:
    enabled: false
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_task_complete:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true

  plan_todo_start:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_todo_stop:
    enabled: false
    handlers:
      - name: plan_lifecycle_logger
        enabled: true
  plan_todo_complete:
    enabled: true
    handlers:
      - name: plan_lifecycle_logger
        enabled: true

# Performance Budgets and Thresholds
performance:
  # Maximum time (ms) for hooks that don't perform validation
  budget_no_op_ms: 2.0
  
  # Maximum time (ms) for hooks that perform validation/processing
  budget_validated_ms: 10.0
  
  # Threshold (ms) above which hooks are logged as slow
  slow_hook_threshold_ms: 10.0
