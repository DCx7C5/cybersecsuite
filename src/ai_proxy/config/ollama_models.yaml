# Ollama Model Configuration — Phase 2
# T0-INF-002: Qwen1.5B config & download
# T125-T132: Model files, GPU memory, capabilities matrix

models:
  qwen1_5b:
    display_name: "Qwen 1.5B (Lightweight)"
    model_id: "qwen:1.5b"
    provider: "ollama"
    status: "configured"
    context_window: 8192
    max_tokens: 512
    gpu_memory_required_mb: 4096  # 4GB VRAM minimum
    ram_required_mb: 2048
    disk_required_gb: 3
    temperature_default: 0.7
    top_p_default: 0.9
    description: "Lightweight Qwen model for edge inference and quick response generation"
    capabilities:
      - text-generation
      - reasoning
      - forensic-analysis
    latency_p50_ms: 50
    latency_p95_ms: 150
    throughput_tokens_per_sec: 45
    quantization: "q4_0"
    
  qwen7b:
    display_name: "Qwen 7B (Standard)"
    model_id: "qwen:7b"
    provider: "ollama"
    status: "available"
    context_window: 32768
    max_tokens: 2048
    gpu_memory_required_mb: 8192  # 8GB VRAM
    ram_required_mb: 4096
    disk_required_gb: 5
    temperature_default: 0.7
    top_p_default: 0.9
    description: "Standard Qwen model for balanced performance and quality"
    capabilities:
      - text-generation
      - reasoning
      - forensic-analysis
      - code-analysis
    latency_p50_ms: 100
    latency_p95_ms: 250
    throughput_tokens_per_sec: 35
    quantization: "q4_0"
    
  llama2_7b:
    display_name: "Llama 2 7B"
    model_id: "llama2:7b"
    provider: "ollama"
    status: "available"
    context_window: 4096
    max_tokens: 1024
    gpu_memory_required_mb: 8192
    ram_required_mb: 4096
    disk_required_gb: 4
    temperature_default: 0.75
    top_p_default: 0.9
    description: "Meta Llama 2 7B for general purpose inference"
    capabilities:
      - text-generation
      - reasoning
    latency_p50_ms: 120
    latency_p95_ms: 280
    throughput_tokens_per_sec: 30
    quantization: "q4_0"

  mistral_7b:
    display_name: "Mistral 7B"
    model_id: "mistral:7b"
    provider: "ollama"
    status: "available"
    context_window: 8192
    max_tokens: 1024
    gpu_memory_required_mb: 7168
    ram_required_mb: 3584
    disk_required_gb: 4
    temperature_default: 0.7
    top_p_default: 0.9
    description: "Mistral 7B for rapid inference with good quality"
    capabilities:
      - text-generation
      - reasoning
      - instruction-following
    latency_p50_ms: 90
    latency_p95_ms: 220
    throughput_tokens_per_sec: 40
    quantization: "q4_0"

default_model: "qwen:1.5b"
fallback_model: "qwen:1.5b"

gpu_requirements:
  nvidia:
    compute_capability_min: "3.5"  # Kepler and newer
    vram_recommendation_gb: 16
    memory_optimization: "flash-attention"
    
  amd:
    rocm_version_min: "5.5"
    vram_recommendation_gb: 16
    memory_optimization: "flash-attention"
    
  apple:
    metal_capability_min: "13.0"
    unified_memory_gb: 8
    memory_optimization: "mps-native"

inference_config:
  batch_size: 1
  timeout_seconds: 30
  retry_count: 3
  retry_delay_ms: 100
  max_concurrent_requests: 5
  
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_requests: true
  log_responses: false  # Privacy: don't log response content
