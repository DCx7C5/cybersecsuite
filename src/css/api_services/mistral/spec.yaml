name: mistral
display_name: Mistral AI
base_url: https://api.mistral.ai/v1
api_type: openai_compatible
models:
  - mistral-large-2407
  - mistral-medium-2312
  - mistral-small-2312
auth:
  methods:
    - api_key
  api_key_env: MISTRAL_API_KEY
  header: Authorization
  scheme: Bearer
endpoints:
  completion: /chat/completions
capabilities:
  streaming: true
  vision: false
  tool_use: true
