
api-services:
  ai21:
    type:
    url:

  anthropic:
    display_name: Anthropic
    base_url: https://api.anthropic.com/v1
    python_package: anthropic
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: ANTHROPIC_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /messages
      models: /models
    capabilities:
      streaming: true
      vision: true
      tool_use: true

  cerebras:
    display_name: Cerebras
