        verification_uri: https://github.com/login/device
      oauth:
        auth_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
    rate_limits:
      requests:
        per_minute: 20
        per_day: 500
      note: "SDK-based — rate limits are soft"
    endpoints:
