api-services:
  ai21:
    display_name: AI21
    base_url: https://api.ai21.com/studio/v1
    python_packages: ai21
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: AI21_API_KEY
      header: Authorization
      scheme: Bearer
    auth_methods:
      api_key: {}
    rate_limits:
      requests:
        per_minute: 20
        per_day: 500
      tokens:
        per_minute: 10000
        per_day: 100000
    endpoints:
      completion: /chat/completions
      models: /models
    capabilities:
      streaming: true
      vision: false
      tool_use: false

