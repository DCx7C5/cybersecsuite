      oauth2:
        auth_url: https://accounts.google.com/o/oauth2/v2/auth
        token_url: https://oauth2.googleapis.com/token
    rate_limits:
      requests:
        per_minute: 10
        per_day: 250
      tokens:
        per_minute: 250000
        per_day: 1000000
      note: "Gemini 2.5 Flash-Lite: 15 RPM / 1000 RPD"
    endpoints:
