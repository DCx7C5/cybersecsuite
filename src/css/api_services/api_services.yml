
api-services:
  ai21:
    type:
    url:

  anthropic:
    display_name: Anthropic
    base_url: https://api.anthropic.com/v1
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: ANTHROPIC_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /messages
      models: /models
    capabilities:
      streaming: true
      vision: true
      tool_use: true

  cerebras:

  cloudflare:

  cohere:
    display_name: Cohere
    base_url: https://api.cohere.ai/v1
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: COHERE_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /chat
      models: /models
    capabilities:
      streaming: true
      vision: false
      tool_use: true

  deepinfra:
    display_name: DeepInfra
    base_url: https://api.deepinfra.com/v1
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: DEEPINFRA_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /openai/v1/chat/completions
      models: /models
    capabilities:
      streaming: true
      vision: false
      tool_use: false


  deepseek:
    display_name: DeepSeek
    base_url: https://api.deepseek.com/v1
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: DEEPSEEK_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /chat/completions
      models: /models
    capabilities:
      streaming: true
      vision: false
      tool_use: true


  fireworks:
    display_name: Fireworks AI
    base_url: https://api.fireworks.ai/inference/v1
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: FIREWORKS_API_KEY
      header: Authorization
      scheme: Bearer
    endpoints:
      completion: /chat/completions
      models: /models

    capabilities:
      streaming: true
      vision: false
      tool_use: false


  github:
    display_name: GitHub Copilot
    base_url: https://api.github.com/v1
    api_type: openai_compatible

  gemini:
    display_name: Google Gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_type: openai_compatible
    models: auto
    auth:
      api_key_env: GEMINI_API_KEY
      header: x-goog-api-key
      scheme: ""
    endpoints:
      completion: /models/{model}:generateContent
    capabilities:
      streaming: true
      vision: true
      tool_use: true

