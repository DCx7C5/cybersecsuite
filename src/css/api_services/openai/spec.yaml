name: openai
display_name: OpenAI
base_url: https://api.openai.com/v1
api_type: openai_compatible
models:
  - gpt-4-turbo
  - gpt-4
  - gpt-3.5-turbo
auth:
  methods:
    - api_key
  api_key_env: OPENAI_API_KEY
  header: Authorization
  scheme: Bearer
endpoints:
  completion: /chat/completions
capabilities:
  streaming: true
  vision: true
  tool_use: true
