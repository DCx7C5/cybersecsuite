combos:
  - id: default
    name: Default Priority
    strategy: priority
    budget_usd: 0.50
    description: Default priority-ordered combo for general use
    tags: [default, general]
    targets:
      - provider_id: openai
        model_id: gpt-4o-mini
        weight: 1.0
        enabled: true
      - provider_id: anthropic
        model_id: claude-haiku
        weight: 1.0
        enabled: true

  - id: local-only
    name: Local-Only Fallback
    strategy: priority
    budget_usd: 0.0
    description: Local models only, no cloud cost
    tags: [local, offline]
